{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResuMetric | View Resume</title>
  <link rel="stylesheet" href="{% static 'css/variables.css' %}">
  <link rel="stylesheet" href="{% static 'css/builder.css' %}">
  <link rel="stylesheet" href="{% static 'css/templates.css' %}">
  <style>
    .view-container {
      padding: 100px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background-color: #020617;
    }
    .view-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      z-index: 1000;
    }
    /* Style custom A4 view */
    .view-paper-wrapper {
      width: 100%;
      max-width: 820px;
      margin-top: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    /* Screen adjustments to make it look nice */
    #preview-paper {
      background: white;
      color: #1e293b;
      min-height: 297mm;
      width: 210mm;
      margin: 0 auto;
      box-sizing: border-box;
    }
    @media print {
      .view-header {
        display: none !important;
      }
      .view-container {
        padding: 0 !important;
        background: transparent !important;
      }
      .view-paper-wrapper {
        margin: 0 !important;
        box-shadow: none !important;
        max-width: none !important;
      }
      #preview-paper {
        margin: 0 !important;
        box-shadow: none !important;
        width: 100% !important;
        height: 100% !important;
      }
    }
  </style>
</head>
<body class="builder-body">

  <header class="view-header">
    <div style="display: flex; align-items: center; gap: 12px;">
      <a href="{% url 'resume_list' %}" class="btn-build-now" style="background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); box-shadow: none; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to List
      </a>
      <span style="font-size: 16px; font-weight: 700; color: var(--text-primary);">{{ resume.full_name }}'s Resume</span>
    </div>
    <div style="display: flex; gap: 12px;">
      <a href="{% url 'resume_edit' resume.resume_id %}" class="btn-build-now" style="background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); box-shadow: none; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Edit Resume
      </a>
      <button class="btn-build-now" id="btn-export-pdf">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </button>
    </div>
  </header>

  <div class="view-container">
    <div class="view-paper-wrapper">
      <div id="preview-paper" class="preview-paper-sheet" style="padding: {{ resume.density_option }}px;">
        <!-- Rendered template will go here -->
      </div>
    </div>
  </div>

  <!-- PDF Vector Export Library CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <!-- Django context injection -->
  <script>
    window.initialResumeData = {{ resume_data_json|safe }};
  </script>

  <!-- Script logic -->
  <script src="{% static 'js/templates.js' %}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const data = window.initialResumeData;
      const paper = document.getElementById('preview-paper');
      
      // Render template
      if (data) {
        paper.innerHTML = renderResume(data);
      }

      // PDF Export
      const btnExport = document.getElementById('btn-export-pdf');
      if (btnExport) {
        btnExport.addEventListener('click', () => {
          const originalText = btnExport.innerHTML;
          btnExport.innerHTML = 'Generating...';
          btnExport.disabled = true;

          const opt = {
            margin: 0,
            filename: `${data.personal.fullName.replace(/\s+/g, '_')}_Resume.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2.5, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
          };

          html2pdf()
            .set(opt)
            .from(paper)
            .save()
            .then(() => {
              btnExport.innerHTML = originalText;
              btnExport.disabled = false;
            })
            .catch((err) => {
              console.error('PDF export failed:', err);
              btnExport.innerHTML = originalText;
              btnExport.disabled = false;
              window.print();
            });
        });
      }
    });
  </script>
</body>
</html>
